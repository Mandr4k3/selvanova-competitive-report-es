n-No se permiten visitantes adicionales  \n\nHorarios: \n -El check-in se realizará a partir de las 3:00 p.m. y el check-out deberá ser antes de las 11:00 a.m. Estos horarios son flexibles bajo solicitud y disponibilidad. \n-Por respeto a los vecinos, se debe mantener un volumen bajo y evitar ruidos excesivos entre las 10:00 p.m. y las 8:00 a.m., durante la hora de silencio.  \n\nMantenimiento y Limpieza: \n-Se espera que los huéspedes mantengan el estudio en buenas condiciones y lo entreguen en el mismo estado en que lo encontraron. \n-Si deseas limpieza adicional durante tu estadía, háznoslo saber con antelación para coordinarla y programarla.  \n\nNo Fumar y No Mascotas:  \n-Está prohibido fumar dentro del estudio y en cualquier área interna del edificio. \n-No se permiten mascotas en el estudio.  \n\nUso de Instalaciones:  \n-Utiliza los electrodomésticos, muebles y otros elementos del estudio de manera adecuada y respetuosa. \n-Si utilizas la cocina, asegúrate de lavar los platos y utensilios utilizados.  \n\nCumplimiento de la Ley:\n Los huéspedes deben cumplir con todas las leyes y regulaciones locales, estatales y federales durante su estadía.  \n\nEventos y Fiestas:\n No se permiten eventos, fiestas ni reuniones grandes en el estudio sin previa autorización.  \n\nSeguridad:  \n-Cuida tus pertenencias personales. No nos hacemos responsables por pérdidas, robos o daños a tus objetos personales. \n-Asegúrate de cerrar bien las puertas y ventanas cuando salgas del estudio. \n\n Incumplimiento y Multas:  \nEl incumplimiento de cualquiera de estas reglas puede resultar en la terminación anticipada de tu estadía sin reembolso.  En caso de incumplimiento, nos reservamos el derecho de aplicar una multa como consecuencia.  Gracias por tu comprensión y por respetar estas pautas. ¡Esperamos que tengas una estancia agradable en nuestro estudio!","recommendedNumberOfLines":5,"minimumNumberOfLinesForTruncation":5,"readMoreButton":{"__typename":"Button","accessibilityLabel
